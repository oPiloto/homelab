x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:latest
    container_name: socket-proxy
    hostname: socket-proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=America/Sao_Paulo
      - AUTH=0
      - SECRETS=0
      - POST=1
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - CONTAINERS=1
      - DISTRIBUTION=0
      - EVENTS=1
      - EXEC=0
      - IMAGES=1
      - INFO=1
      - NETWORKS=1
      - NODES=0
      - PLUGINS=0
      - SERVICES=1
      - SESSION=0
      - SWARM=0
      - SYSTEM=0
      - TASKS=1
      - VOLUMES=1
    read_only: true
    tmpfs:
      - /run
    networks:
      - docker-socket
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2375/info"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    hostname: crowdsec
    restart: unless-stopped
    expose:
      - 8080
      - 7422
    depends_on:
      socket-proxy:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./crowdsec/config/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - ./crowdsec/config/appsec.yaml:/etc/crowdsec/acquis.d/appsec.yaml:ro
      - ./crowdsec/config/profiles.yaml:/etc/crowdsec/profiles.yaml:ro
      - crowdsec_db:/var/lib/crowdsec/data
      - traefik_logs:/var/log/traefik:ro
      - nextcloud_logs:/var/log/nextcloud:ro
      - vault_logs:/var/log/vaultwarden:ro
    environment:
      - TZ=America/Sao_Paulo
      - COLLECTIONS=crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/whitelist-good-actors crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules crowdsecurity/nextcloud Dominic-Wagner/vaultwarden
      - BOUNCER_KEY_TRAEFIK=${CROWDSEC_BOUNCER_KEY}
    networks:
      - traefik
    healthcheck:
      test: ["CMD-SHELL", "cscli lapi status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  traefik:
    image: traefik:v3.7
    container_name: traefik
    hostname: traefik
    restart: always
    depends_on:
      socket-proxy:
        condition: service_healthy
      crowdsec:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./config/:/etc/traefik/:ro
      - ./certs/:/var/traefik/certs/:rw
      - ./secrets/:/run/secrets/traefik:ro
      - traefik_plugins:/plugins-storage:rw
      - traefik_logs:/logs
    env_file:
      - ./.env
    environment:
      - TZ=America/Sao_Paulo
      - TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_EMAIL=${EMAIL}
      - TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_TLS_DOMAINS_0_MAIN=${DOMAIN}
      - TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_TLS_DOMAINS_0_SANS_0=*.${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.api.service=api@internal"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.middlewares=local-ipwhitelist@file"
    networks:
      - traefik
      - docker-socket
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

volumes:
  traefik_plugins:
  traefik_logs:
  crowdsec_db:
  vault_logs:
    external: true
  nextcloud_logs:
    external: true

networks:
  # docker network create traefik
  traefik:
    external: true
  docker-socket:
    internal: true
